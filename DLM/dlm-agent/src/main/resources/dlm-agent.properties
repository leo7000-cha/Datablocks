# ============================================
# DLM Agent Configuration
# ============================================

# DLM Server Connection
dlm.server.url=https://dlm-server:8080
dlm.agent.id=CORE_BANKING_WAS1
dlm.agent.secret=

# User Identification
# dlm.user.header=X-User-Id
# dlm.user.session-attr=loginUser

# Performance Tuning
dlm.buffer.capacity=10000
dlm.shipper.batch-size=500
dlm.shipper.flush-interval-ms=3000
dlm.policy.sync-interval-ms=300000

# SQL Filtering (comma-separated, case-insensitive)
dlm.exclude.sql-patterns=SELECT 1,SELECT SYSDATE,PING,SET NAMES
dlm.exclude.users=SYS,SYSTEM,MONITOR

# Failover
dlm.failover.dir=/tmp/dlm-agent-failover

# Sidecar Capture (Phase 4)
# PreparedStatement.set*() 가로채기로 bind 값 누적 → DLM 서버 sidecar.bind_params 적재.
# 메모리/CPU 영향 가능 (PS 호출당 set* 메서드 N회 추가 가로채기). 운영 환경 검증 후 활성화 권장.
dlm.capture.bind=false
