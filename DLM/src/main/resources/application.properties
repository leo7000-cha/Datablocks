# DB 접속정보는 환경변수(SPRING_DATASOURCE_URL/USERNAME/PASSWORD)로만 주입
# — 이미지 내부 평문 금지 정책(한국손사 운영 기준) 준수
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=10000
spring.datasource.hikari.maximum-pool-size=50

# MyBatis.................................
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=false
mybatis.type-aliases-package=datablocks.dlm.mapper
logging.level.com.atoz_develop.mybatissample.repository=TRACE

# JPA 사용 안함 - MyBatis만 사용
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.show-sql=true

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
#server.servlet.context-path=/index

# Jasper 최적화 (운영 모드)
# - development=false : 요청마다 JSP mtime 체크 비활성화 → 첫 진입 후 재요청 빠름
# - modificationTestInterval=0 : JSP 수정 감지 완전 off (핫리로드가 필요하면 4 등으로)
# - trimSpaces=true : 공백 제거로 응답 크기 소폭 감소
# - genStringAsCharArray=true : 문자열 리터럴 char[] 출력 → 컴파일된 JSP 실행 속도 향상
server.servlet.jsp.init-parameters.development=false
server.servlet.jsp.init-parameters.modificationTestInterval=0
server.servlet.jsp.init-parameters.trimSpaces=true
server.servlet.jsp.init-parameters.genStringAsCharArray=true
server.servlet.jsp.init-parameters.fork=false

# Session cookie — 동일 서버 다중 Tomcat 환경에서 JSESSIONID 충돌 방지
server.servlet.session.cookie.name=DLMSESSIONID

# 세션 타임아웃 (기본 30분) — 명시적 선언
server.servlet.session.timeout=30m

# application.properties
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

#Tomcat.................................  java -Xms2048m -Xmx4096m -jar jarFileName.jar
server.port=8080
#server.port=8088 #SONSA 용
server.compression.enabled=true
server.tomcat.accesslog.enabled=true
server.tomcat.basedir=.
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.file-date-format=.yyyy-MM-dd
#server.tomcat.accesslog.pattern=common #일반적인 access log 포맷 적용시 \
server.tomcat.accesslog.pattern=%{yyyy-MM-dd HH:mm:ss}t %s %r %{User-Agent}i %{Referer}i %a %b %D
# Tomcat이 스캔할 때 제외할 JAR 파일 목록을 지정합니다.
server.tomcat.util-scan.standard-jar-scan-filter.jars-to-skip=orai18n*.jar,oraclepki*.jar,osdt*.jar,simplefan*.jar,ucp*.jar,ons*.jar
server.tomcat.additional-tld-skip-patterns=orai18n*.jar,oraclepki*.jar,osdt*.jar,simplefan*.jar,ucp*.jar,ons*.jar

#keytool -genkey -alias dlm-keystore -storetype PKCS12 -keyalg RSA -keysize 2048 -keystore dlm-keystore.p12 -validity 3650
server.ssl.enabled=false
server.ssl.key-alias=dlm-keystore
server.ssl.key-password=dlmssl
server.ssl.key-store=classpath:dlm-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=dlmssl
kserver.ssl.ey-store-provider=SUN

#Multipart.................................
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=./upload
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.max-file-size=200MB

# X-One.properties
xone.home-db-name=DLM
xone.system-name=CORE

# ========== X-Audit / 접속기록 저장 (XAUDIT_DB 단일 논리 엔드포인트) ==========
# 2026-04-25 V3 재설계:
#   · 모든 접속기록 I/O (INSERT/SELECT/이상탐지) 가 XAUDIT_DB 단일 DataSource 경유
#   · 물리적 저장소는 TBL_PIIDATABASE.db='XAUDIT_DB' 엔트리가 결정
#       (기본: DLM 내부 DB 에 자동 등록 / 변경: UI 에서 해당 엔트리 편집)
#   · 모드 개념 (COTDL / EXTERNAL) 제거 — Spring AbstractRoutingDataSource 패턴
#
# 고객사 별도 DB 로 전환:
#   1) 별도 DB 에 database/xaudit/XAUDIT_SCHEMA_*.sql 실행
#   2) DLM UI 에서 TBL_PIIDATABASE 의 XAUDIT_DB 엔트리를 해당 DB 정보로 수정
#   3) DLM 재기동
xaudit.storage.pool-size=${XAUDIT_STORAGE_POOL_SIZE:4}
xaudit.storage.retry-init-seconds=${XAUDIT_STORAGE_RETRY_INIT_SECONDS:60}

