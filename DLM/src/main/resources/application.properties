# applijcation.properties in 'src/main/resources'  그냥 jar를 실행하는 폴더에 application.properties 파일을 두고 거기에 처음에 설명한 것처럼 외부 설정파일을 지정하면 된다. jar 외부에 있는 application.properties 파일이 더 우선순위가 높기 때문에 그곳에 지정한 파일이 적용된다.

#java -jar -Dspring.profiles.active=prod
#spring.profiles.active = prod
#spring.profiles.active = api
spring.profiles.active=local

# ========== Mail (SMTP) ==========
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
logging.config=classpath:logback-${spring.profiles.active}.xml

#- 참고 순서
#1) classpath(resources디렉토리 밑)에 logback-spring.xml파일이 있으면 설정파일을 읽어간다.
#2) logback-spring.xml파일이 없다면 .yml(.properties)파일의 설정을 읽어간다.
#3) logback-spring.xml파일과 .yml(.properties)파일이 동시에 있으면 .yml(.properties) 설정 파일을 적용 후 xml파일이 적용된다

