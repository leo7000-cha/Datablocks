# ==============================================================================
# DLM Docker Compose — 한국손해보험 전용
# ==============================================================================
# ★ 기존 Docker 컨테이너 'mariadb'가 이미 운영 중
# ★ DLM + Privacy-AI 만 실행, 기존 mariadb 에 dlm-network 으로 연결
#
# 사전 조건:
#   1) deploy.sh 가 기존 mariadb 컨테이너를 dlm-network 에 연결해 줌
#   2) 네트워크 dlm-network 은 deploy.sh 에서 미리 생성
#
# 사용법:
#   docker compose -f docker-compose.hanson.yml up -d
#
# 로그:    docker logs -f dlm-app
# 중지:    docker compose -f docker-compose.hanson.yml down
# 재시작:  docker compose -f docker-compose.hanson.yml restart
# ==============================================================================

services:
  # ============================================================================
  # DLM - Spring Boot Main Application
  # ============================================================================
  dlm:
    image: datablocks-dlm:latest
    container_name: dlm-app
    restart: unless-stopped
    env_file: .env.hanson
    environment:
      TZ: Asia/Seoul
    ports:
      - "${DLM_PORT:-8082}:8080"
    volumes:
      - dlm_logs:/app/logs
      - dlm_upload:/app/upload
    networks:
      - dlm-network
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 12G
        reservations:
          cpus: "1.5"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================================================
  # DLM-Privacy-AI - FastAPI AI Service
  # ============================================================================
  dlm-privacy-ai:
    image: datablocks-dlm-privacy-ai:latest
    container_name: dlm-privacy-ai
    restart: unless-stopped
    env_file: .env.hanson
    environment:
      TZ: Asia/Seoul
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - privacy_ai_logs:/app/logs
      - privacy_ai_models:/app/models
    networks:
      - dlm-network
    depends_on:
      dlm:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ==============================================================================
# Networks — 외부에서 미리 생성된 네트워크 사용
# deploy.sh 에서 docker network create dlm-network 후
# 기존 mariadb 컨테이너를 이 네트워크에 연결
# ==============================================================================
networks:
  dlm-network:
    external: true
    name: dlm-network

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  dlm_logs:
    name: dlm-app-logs
  dlm_upload:
    name: dlm-app-upload
  privacy_ai_logs:
    name: dlm-privacy-ai-logs
  privacy_ai_models:
    name: dlm-privacy-ai-models
