# ==============================================================================
# DLM Docker Compose — 한국손해보험 전용
# ==============================================================================
# ★ 기존 Docker 컨테이너 'mariadb'가 이미 운영 중
# ★ DLM + Privacy-AI 가 기존 mariadb의 네트워크에 참여 (기존 환경 수정 없음)
#
# 사전 조건:
#   deploy.sh 가 기존 mariadb 컨테이너의 네트워크를 감지하여
#   MARIADB_NETWORK 환경변수로 전달
#
# 사용법:
#   docker compose -f docker-compose.hanson.yml up -d
#
# 로그:    docker logs -f dlm-app
# 중지:    docker compose -f docker-compose.hanson.yml down
# 재시작:  docker compose -f docker-compose.hanson.yml restart
# ==============================================================================

services:
  # ============================================================================
  # DLM - Spring Boot Main Application
  # ============================================================================
  dlm:
    image: datablocks-dlm:1.0.0
    container_name: dlm-app
    restart: unless-stopped
    env_file: .env.hanson
    environment:
      TZ: Asia/Seoul
    ports:
      - "${DLM_PORT:-8082}:8080"
    volumes:
      - dlm_logs:/app/logs
      - dlm_upload:/app/upload
    networks:
      - mariadb-net
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 12G
        reservations:
          cpus: "1.5"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================================================
  # DLM-Privacy-AI - FastAPI AI Service
  # ============================================================================
  dlm-privacy-ai:
    image: datablocks-dlm-privacy-ai:1.0.0
    container_name: dlm-privacy-ai
    restart: unless-stopped
    env_file: .env.hanson
    environment:
      TZ: Asia/Seoul
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - privacy_ai_logs:/app/logs
      - privacy_ai_models:/app/models
    networks:
      - mariadb-net
    depends_on:
      dlm:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ==============================================================================
# Networks — 기존 mariadb 컨테이너의 네트워크에 참여
# deploy.sh 가 감지한 네트워크명을 MARIADB_NETWORK 으로 전달
# ==============================================================================
networks:
  mariadb-net:
    external: true
    name: ${MARIADB_NETWORK}

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  dlm_logs:
    name: dlm-app-logs
  dlm_upload:
    name: dlm-app-upload
  privacy_ai_logs:
    name: dlm-privacy-ai-logs
  privacy_ai_models:
    name: dlm-privacy-ai-models
