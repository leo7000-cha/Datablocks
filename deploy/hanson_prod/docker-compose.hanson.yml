# ==============================================================================
# DLM Docker Compose — 한국손해보험 (PROD: OS 설치형 MariaDB)
# ==============================================================================
# ★ MariaDB 가 호스트 OS 에 직접 설치되어 있음 (Docker 컨테이너 아님)
# ★ DLM + Privacy-AI 가 host-gateway 를 통해 호스트의 MariaDB 로 접속
#
# 접속 경로:
#   [dlm-app 컨테이너] ──host.docker.internal:3306──→ [호스트 OS MariaDB]
#
# 사전 조건:
#   1. 호스트 OS 에 MariaDB 가 설치되어 실행 중
#   2. MariaDB 의 bind-address 가 호스트의 docker0 bridge IP (또는 0.0.0.0) 를 수신
#   3. cotdl 계정이 docker bridge 대역(예: 172.17.0.0/16)에서 접속 허용됨
#
# 사용법:
#   docker compose --env-file .env.hanson -f docker-compose.hanson.yml up -d
#
# 로그:    docker logs -f dlm-app
# 중지:    docker compose -f docker-compose.hanson.yml down
# 재시작:  docker compose -f docker-compose.hanson.yml restart
# ==============================================================================

services:
  # ============================================================================
  # DLM - Spring Boot Main Application
  # ============================================================================
  dlm:
    image: datablocks-dlm:latest
    container_name: dlm-app
    restart: unless-stopped
    env_file: .env.hanson
    environment:
      TZ: Asia/Seoul
    ports:
      - "${DLM_PORT:-8082}:8080"
    # ★ PROD: 호스트 OS 의 MariaDB 에 접속하기 위해 host-gateway 매핑
    #   컨테이너에서 host.docker.internal → 호스트 IP 로 자동 해석됨
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlm_logs:/app/logs
      - dlm_upload:/app/upload
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 12G
        reservations:
          cpus: "1.5"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================================================
  # DLM-Privacy-AI - FastAPI AI Service
  # ============================================================================
  dlm-privacy-ai:
    image: datablocks-dlm-privacy-ai:latest
    container_name: dlm-privacy-ai
    restart: unless-stopped
    env_file: .env.hanson
    environment:
      TZ: Asia/Seoul
    ports:
      - "${AI_PORT:-8000}:8000"
    # ★ PROD: 호스트 OS 의 MariaDB 에 접속하기 위해 host-gateway 매핑
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - privacy_ai_logs:/app/logs
      - privacy_ai_models:/app/models
    depends_on:
      dlm:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ==============================================================================
# Networks
# ------------------------------------------------------------------------------
# PROD 는 외부 mariadb 컨테이너 네트워크가 없으므로 Compose 기본 네트워크 사용.
# 컨테이너 간 통신(dlm ↔ dlm-privacy-ai)은 compose 기본 브리지로 처리.
# ==============================================================================

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  dlm_logs:
    name: dlm-app-logs
  dlm_upload:
    name: dlm-app-upload
  privacy_ai_logs:
    name: dlm-privacy-ai-logs
  privacy_ai_models:
    name: dlm-privacy-ai-models
