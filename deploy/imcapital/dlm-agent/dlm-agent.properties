# ============================================
# DLM Agent — iM캐피탈 처리계 WAS
# ============================================

# DLM 서버 접속 (iM캐피탈 DLM 서버 주소로 변경)
dlm.server.url=http://192.168.1.100:8080
dlm.agent.id=IMCAP_WAS1
# dlm.agent.secret=
# 보안 강화 시: DLM DB에서 아래 SQL 실행 후 동일한 값을 위에 입력
# INSERT INTO COTDL.TBL_ACCESS_LOG_CONFIG (config_id, config_key, config_value, config_type, description, is_active)
# VALUES (UUID(), 'AGENT_API_SECRET', '여기에_비밀키_입력', 'COLLECT', 'Agent 인증 비밀키', 'Y');
# 이미 등록된 경우: UPDATE COTDL.TBL_ACCESS_LOG_CONFIG SET config_value='새_비밀키' WHERE config_key='AGENT_API_SECRET';

# 사용자 식별: 세션 속성
# WAS 담당자에게 확인 후 입력 (예: loginVO.id, userId 등)
# 비워두면 Spring Security > Remote User 순으로 자동 탐지
# dlm.user.session-attr=

# 사용자 식별: SSO 헤더 (SSO 환경인 경우만)
# dlm.user.header=

# 버퍼 & 전송
dlm.buffer.capacity=10000
dlm.shipper.batch-size=500
dlm.shipper.flush-interval-ms=3000

# PII 정책 동기화 (5분)
dlm.policy.sync-interval-ms=300000

# 제외 SQL 패턴 (헬스체크, 모니터링 등)
dlm.exclude.sql-patterns=SELECT 1,SELECT SYSDATE,PING,SET NAMES

# 제외 계정 (DB 관리자 등 — WAS 연결풀 계정은 제외하지 마세요)
dlm.exclude.users=SYS,SYSTEM

# 장애 복구 (전송 실패 시 로컬 임시 저장)
dlm.failover.dir=/opt/dlm-agent/failover
