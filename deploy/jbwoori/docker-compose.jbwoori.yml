# ==============================================================================
# DLM Docker Compose — JB우리캐피탈 전용
# ==============================================================================
# ★ MariaDB는 호스트 OS (Rocky 9)에 직접 설치되어 운영 중
# ★ DLM + Privacy-AI 컨테이너가 host.docker.internal 로 호스트 DB에 접속
#
# 사용법:
#   docker compose --env-file .env.jbwoori -f docker-compose.jbwoori.yml up -d
#
# 로그:    docker logs -f dlm-app
# 중지:    docker compose --env-file .env.jbwoori -f docker-compose.jbwoori.yml down
# 재시작:  docker compose --env-file .env.jbwoori -f docker-compose.jbwoori.yml restart
# ==============================================================================

services:
  # ============================================================================
  # DLM - Spring Boot Main Application
  # ============================================================================
  dlm:
    image: datablocks-dlm:1.0.0
    container_name: dlm-app
    restart: unless-stopped
    env_file: .env.jbwoori
    environment:
      TZ: Asia/Seoul
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DLM_PORT:-8080}:8080"
      # HTTPS 활성 시 주석 해제 (.env.jbwoori 참조):
      # - "${DLM_PORT_HTTPS:-8443}:8443"
    volumes:
      - dlm_logs:/app/logs
      - dlm_upload:/app/upload
      # HTTPS 활성 시 주석 해제 (certs/dlm-keystore.p12 먼저 배치):
      # - ./certs/dlm-keystore.p12:/etc/ssl/dlm-keystore.p12:ro
    networks:
      - dlm-network
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 12G
        reservations:
          cpus: "1.5"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================================================
  # DLM-Privacy-AI - FastAPI AI Service
  # ============================================================================
  dlm-privacy-ai:
    image: datablocks-dlm-privacy-ai:1.0.0
    container_name: dlm-privacy-ai
    restart: unless-stopped
    env_file: .env.jbwoori
    environment:
      TZ: Asia/Seoul
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - privacy_ai_logs:/app/logs
      - privacy_ai_models:/app/models
    networks:
      - dlm-network
    depends_on:
      dlm:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ==============================================================================
# Networks — DLM 전용 브리지 네트워크
# ==============================================================================
networks:
  dlm-network:
    driver: bridge
    name: dlm-network

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  dlm_logs:
    name: dlm-app-logs
  dlm_upload:
    name: dlm-app-upload
  privacy_ai_logs:
    name: dlm-privacy-ai-logs
  privacy_ai_models:
    name: dlm-privacy-ai-models
