# ═══════════════════════════════════════════════════════════════════════════════
# ⚠ 중요: 이것은 Spring Profile 파일이 아닙니다 ⚠
# ═══════════════════════════════════════════════════════════════════════════════
#
# 이 파일은 고객사 기존 application.properties 에 "xaudit.*" 라인들을
# 병합(merge)하여 복사해 넣는 **스니펫(snippet)** 입니다. 단독 실행 불가능합니다.
#
# 파일명이 "application-xxxx.properties" 가 아닌 "xaudit-config-snippet.properties"
# 인 이유:
#   - Spring Boot 의 "application-{프로파일}.properties" 명명 규칙과 혼동 방지
#   - 이 파일은 프로파일 파일이 아니라 "복붙용 조각" 입니다.
#
# 사용법 (3단계):
#   1) 고객사 Spring Boot 프로젝트의 application.properties 를 연다
#   2) 아래 xaudit.* 라인들 전체 또는 필요한 키만 파일 끝에 복사해 넣는다
#   3) WAS 재기동하면 SDK 자동 활성화
#
# ※ 고객사가 application.yml 형식을 쓴다면 xaudit-config-snippet.yml 을 대신
#   사용하세요 (동일 내용의 계층 구조 형식).
#
# ═══════════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────────────
# [필수] SDK 전체 on/off
# ─────────────────────────────────────────────────────────────────────────────
# 비상 시 false 로 즉시 비활성화 가능. 단, 재기동 필요 (hot-reload 미지원).
xaudit.enabled=true


# ─────────────────────────────────────────────────────────────────────────────
# [필수] 처리계 식별자
# ─────────────────────────────────────────────────────────────────────────────
# 여러 처리계가 같은 DLM 서버로 로그를 보낼 때 구분하는 키.
# DLM 수신측 DB 의 service_name 컬럼에 그대로 저장됨.
# 예시: LOAN_CORE / CUST_CORE / CARD_CORE / CORE_BANK / WEB_FRONT / COLLECTION
xaudit.service-name=LOAN_CORE


# ─────────────────────────────────────────────────────────────────────────────
# [필수] DLM 수집 서버 연결 정보
# ─────────────────────────────────────────────────────────────────────────────

# DLM 서버 수신 엔드포인트 (실제 내부망 IP/호스트로 교체)
# → 고객사 기간계 WAS 에서 DLM 서버로 "단방향 HTTP(S)" 방화벽 오픈 필요
xaudit.server.url=https://dlm.bank.internal:8443/api/xaudit/events

# [권장] API Key 는 평문 저장 금지. 환경변수로 주입:
#   export DLM_API_KEY="ABCD1234..."  → ${DLM_API_KEY:} 로 참조
# 보안팀 요구시 HashiCorp Vault / AWS Secrets Manager 등 연동 가능.
xaudit.server.api-key=${DLM_API_KEY:}

# DLM 서버 응답 타임아웃. 너무 길게 잡으면 처리계 성능 영향 가능
# → SDK 는 어차피 비동기 큐 기반이라 타임아웃은 짧게 (2~5초) 권장
xaudit.server.connect-timeout-ms=2000
xaudit.server.read-timeout-ms=5000


# ─────────────────────────────────────────────────────────────────────────────
# [성능 보호] 배치/큐 설정 — 기본값 대부분 적정, TPS 높으면만 조정
# ─────────────────────────────────────────────────────────────────────────────

# 큐 용량. 폭주 시 DROP + warn 로깅 → 처리계 비즈니스 흐름은 절대 안 막힘.
# DLM 서버 장애나 네트워크 이슈로 전송 누락 발생해도 WAS 메모리 폭주 방지.
xaudit.batch.queue-capacity=10000

# 한 번에 전송할 배치 크기. 배치가 클수록 네트워크 효율↑, 지연↑
xaudit.batch.size=100

# 배치가 다 안 찼어도 이 시간 지나면 강제 flush (= 최대 지연 시간)
xaudit.batch.flush-interval-ms=3000

# 송신 워커 스레드 수. 해시체인(무결성) 보장 때문에 1 권장.
# 100 TPS 초과 환경에서만 2~4 고려.
xaudit.batch.worker-threads=1


# ─────────────────────────────────────────────────────────────────────────────
# [필수] 사용자 식별 전략 — 고객사 인증체계에 맞춰 하나만 활성
# ─────────────────────────────────────────────────────────────────────────────
# 우선순위: header > session-attribute > SecurityContext > anonymous
#
# 고객사 자료 ②: "인증 체계 설명" 을 받은 뒤 해당 방식으로 설정.
# ─────────────────────────────────────────────────────────────────────────────

# [방식 1] Spring Security 를 쓰는 경우 (대부분 기본값 그대로 유지)
xaudit.user.use-security-context=true

# [방식 2] 세션 기반 인증인 경우 (레거시 시스템에 많음)
# 예: 로그인 후 session.setAttribute("USER_ID", "hong123") 형태라면:
#   xaudit.user.session-attribute=USER_ID
xaudit.user.session-attribute=

# [방식 3] API Gateway / SSO 가 HTTP 헤더로 사용자 ID 주입하는 경우
# 예: X-User-Id 헤더에 사용자ID 가 매번 들어오면:
#   xaudit.user.header=X-User-Id
xaudit.user.header=


# ─────────────────────────────────────────────────────────────────────────────
# [필수] 메뉴 식별 — "어느 업무화면에서 발생한 요청인가" 분류용
# ─────────────────────────────────────────────────────────────────────────────
# 왜 메뉴가 필요한가:
#   - 같은 /detail URL 도 "여신심사 상세" vs "채권상담 상세" 구분 필요
#   - "과다조회자 점검" / "월증감율 분석" 등은 URL 이 아닌 업무 단위로 집계해야 함
#   - DLM 접속기록 화면에서 "메뉴=여신심사" 식으로 필터링 가능
#
# 설정 방식 2가지:
#   [방식 A] 프런트엔드가 X-Menu-Id 헤더로 메뉴ID 전송 (고객사 프런트 수정 필요)
#   [방식 B] URI prefix 로 역추론 (고객사 수정 0줄 — 대부분 이 방식) ★ 권장
#
# ※ "X-Menu-Id" 는 HTTP 표준 헤더가 아니라 커스텀 헤더입니다.
#   브라우저는 기본으로 이 헤더를 안 보냅니다. 방식 A 를 쓰려면 고객사
#   프런트엔드 코드에서 매 요청마다 이 헤더를 주입해야 합니다.
#   → 고객사 소스 수정이 부담되면 "방식 B" 만 쓰는 게 정상입니다.
#
# ※ 방식 B 만 쓸 경우: xaudit.menu.header 설정 생략해도 됨.
#   기본값이 X-Menu-Id 로 박혀있지만, 고객사 프런트가 그 헤더를 안 보내면
#   req.getHeader() 가 null 반환 → 자동으로 URI 매핑으로 fallback.
#   성능 차이는 헤더 조회 1회(나노초 수준), 동작은 100% 동일.
# ─────────────────────────────────────────────────────────────────────────────

# [방식 A 전용] 프런트엔드가 이미 메뉴 헤더를 보내면 이 이름으로 받음.
# 방식 B 만 쓸 거면 이 라인은 삭제하거나 빈 값으로 둬도 됨.
xaudit.menu.header=X-Menu-Id

# [방식 B] 고객사로부터 받은 "화면별 URL 패턴표" 를 그대로 옮겨 적기.
# 요청 URI 가 value (예: /loan/review/) 로 시작하면 → key (예: 여신심사) 로 태깅.
#
# 샘플 (JB우리캐피탈 가상 예시 — 실제 매핑은 고객사 URL 패턴표 기반으로 교체):
xaudit.menu.uri-prefix-map.여신심사=/loan/review/
xaudit.menu.uri-prefix-map.대출상담=/loan/apply/
xaudit.menu.uri-prefix-map.고객관리=/cust/mgmt/
xaudit.menu.uri-prefix-map.채권상담=/collection/
xaudit.menu.uri-prefix-map.신용조회=/credit/inquiry/
xaudit.menu.uri-prefix-map.계약관리=/contract/


# ─────────────────────────────────────────────────────────────────────────────
# [보안] SQL 수집 옵션
# ─────────────────────────────────────────────────────────────────────────────

# SQL 본문 수집 여부. 법적 요구상 true 권장 (무슨 쿼리였는지 증거 필요).
xaudit.sql.capture-text=true

# 바인딩 파라미터 수집 여부. 실제 조회 대상 값이 여기 들어감.
# 개인정보 보호 정책상 bind 수집이 제한되면 false 로.
xaudit.sql.capture-bind-params=true

# SQL 본문 최대 저장 길이 (초과 시 절삭). 긴 동적쿼리 대응.
xaudit.sql.max-text-length=8000
xaudit.sql.max-bind-length=2000

# SQL 앞에 /*XAUDIT USER=...;MENU=...*/ 주석 자동 prepend
# → 기존 DAM 장비(DBSAFER/PSM 등)가 SQL 패킷에서 사용자 식별자를 꺼낼 수 있음
# ⚠ Oracle 은 가변값 prepend 시 shared pool 오염 위험 → 고정 키만 삽입
xaudit.sql.comment-injection=false

# PII(개인정보) 자동 탐지/마스킹 대상 (정규식 기반)
# 전송 전에 SQL 본문·바인딩값에서 아래 유형 발견 시 치환:
#   JUMIN   → 주민등록번호 (xxxxxx-xxxxxxx)
#   CARD    → 카드번호 (xxxx-xxxx-xxxx-xxxx)
#   ACCOUNT → 계좌번호
#   PHONE   → 전화번호 (선택)
#   EMAIL   → 이메일 (선택)
xaudit.sql.mask-patterns=JUMIN,CARD,ACCOUNT


# ─────────────────────────────────────────────────────────────────────────────
# [선택] Oracle 전용 옵션
# ─────────────────────────────────────────────────────────────────────────────
# Oracle V$SESSION.CLIENT_IDENTIFIER 에 사용자 ID 자동 세팅.
# → DB Audit Trail / DAM 장비 패킷에 사용자 식별자 자동 반영
# ⚠ Tibero / MariaDB / MySQL 은 지원 안 함 — Oracle 환경에서만 true
# ⚠ HikariCP 를 쓰면 반납 시 clear 되도록 connectionInitSql 설정 권장:
#    spring.datasource.hikari.connection-init-sql=BEGIN DBMS_SESSION.CLEAR_IDENTIFIER; END;
xaudit.oracle.set-client-info=false


# ─────────────────────────────────────────────────────────────────────────────
# [성능 보호] 수집 제외할 URI prefix (정적 리소스 / 헬스체크)
# ─────────────────────────────────────────────────────────────────────────────
# 매칭 방식: uri.startsWith(패턴). 와일드카드/정규식 지원 안 함.
#
# 왜 제외하나:
#   - /health, /actuator 는 LB 가 초당 수회 호출 → 로그 홍수
#   - /css, /js, /images 는 개인정보 없음 → 수집 의미 없음
#   - 제외 안 하면 DLM DB 용량 급속 증가
#
# 주의: 너무 광범위하게 (/api/ 전체 등) 빼면 감사 공백 발생
# 판단 기준: "이 URI 에서 개인정보를 다루는가?" Yes → 포함 / No → 제외
#
# 쉼표(,) 구분으로 여러 prefix 등록. 줄바꿈은 \ 로 이어쓰기 가능.
# ─────────────────────────────────────────────────────────────────────────────
xaudit.exclude-uri-patterns=/health,/actuator,/css/,/js/,/images/,/fonts/,/webjars/,/favicon,/error
