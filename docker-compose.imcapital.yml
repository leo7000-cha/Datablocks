# ==============================================================================
# DLM Docker Compose — iM캐피탈 전용
# ==============================================================================
# Docker/MariaDB는 고객사에 설치됨
# DLM + Privacy-AI 컨테이너만 실행
#
# 사용법:
#   docker compose -f docker-compose.imcapital.yml up -d
#
# 로그:    docker logs -f dlm-app
# 중지:    docker compose -f docker-compose.imcapital.yml down
# 재시작:  docker compose -f docker-compose.imcapital.yml restart
# ==============================================================================

services:
  # ============================================================================
  # DLM - Spring Boot Main Application
  # ============================================================================
  dlm:
    image: datablocks-dlm:latest
    container_name: dlm-app
    restart: unless-stopped
    env_file: .env.imcapital
    environment:
      TZ: Asia/Seoul
    ports:
      - "${DLM_PORT:-8080}:8080"
    volumes:
      - dlm_logs:/app/logs
      - dlm_upload:/app/upload
    networks:
      - dlm-network
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 12G
        reservations:
          cpus: "1.5"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================================================
  # DLM-Privacy-AI - FastAPI AI Service
  # ============================================================================
  dlm-privacy-ai:
    image: datablocks-dlm-privacy-ai:latest
    container_name: dlm-privacy-ai
    restart: unless-stopped
    env_file: .env.imcapital
    environment:
      TZ: Asia/Seoul
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - privacy_ai_logs:/app/logs
      - privacy_ai_models:/app/models
    networks:
      - dlm-network
    depends_on:
      dlm:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ==============================================================================
# Networks
# ==============================================================================
networks:
  dlm-network:
    driver: bridge
    name: dlm-network

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  dlm_logs:
    name: dlm-app-logs
  dlm_upload:
    name: dlm-app-upload
  privacy_ai_logs:
    name: dlm-privacy-ai-logs
  privacy_ai_models:
    name: dlm-privacy-ai-models
